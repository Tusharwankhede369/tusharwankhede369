name: Generate Snake

on:
  schedule: 
    - cron: "0 0 * * *"    # Runs every day at midnight
  workflow_dispatch:       # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk@v3.2.0
        id: snake
        with:
          github_user_name: Tusharwankhede369
          svg_out_path: output/github-snake.svg
          dark_svg_out_path: output/github-snake-dark.svg

      - name: Commit & Push
        uses: EndBug/add-and-commit@v9
        with:
          message: "Generate GitHub contribution snake"
          add: "output/*.svg"
